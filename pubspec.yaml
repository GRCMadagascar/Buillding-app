name: billing_app
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  
  # State Management & DI
  flutter_bloc: ^8.1.5
  get_it: ^7.6.7
  equatable: ^2.0.5
  
  # Functional Programming
  fpdart: ^1.1.0
  
  # Code Generation Annotations
  json_annotation: ^4.9.0
  
  # Navigation
  go_router: ^14.0.0
  
  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI & Utilities
  google_fonts: ^6.1.0
  flutter_vibrate: ^1.3.0
  intl: ^0.20.2
  permission_handler: ^11.3.1
  image_picker: ^0.8.7+4
  image: ^4.0.17
  path_provider: ^2.0.14
  shared_preferences: ^2.1.1
  
  # Scanner & Printer
  pretty_qr_code: ^3.3.0
  print_bluetooth_thermal: ^1.1.2
  mobile_scanner: ^5.1.0
  bloc: ^8.1.4
  uuid: ^4.5.2
  app_settings: ^7.0.0
  url_launcher: ^6.1.11
  flutter_gen: ^5.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"  # Nampiana elanelana 2 eto mba hitovy amin'ny ambony

    
  # Code Generation
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  # Ity ampahany ity no mampiditra ny sary sy ny logo-nao
  assets:
    - assets/Fond.jpg
    - assets/grc_logo.png
    - assets/mvola_logo.png
    - assets/orange_logo.png
    - assets/airtel_logo.png
    - assets/delete_illustration.png

 # Iny andalana 65 iny akisaka kely miankavia indrindra
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/grc_logo.png"
  android_icon_name: "Billing POS by GRC"
  ios_icon_name: "Billing POS by GRC"
  adaptive_icon_background: "#ffffff"
